<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      text-align: center;
      letter-spacing: 0.02em;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }

    .input-row input:focus {
      border-color: #5c7cfa;
    }

    .input-row button {
      padding: 10px 18px;
      background: #5c7cfa;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4263eb;
    }

    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      background: #f8f9ff;
      border: 1px solid #e8eaf6;
      border-radius: 10px;
    }

    .task-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      cursor: pointer;
      word-break: break-all;
      user-select: none;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      padding: 5px 12px;
      background: transparent;
      color: #e03131;
      border: 1px solid #e03131;
      border-radius: 7px;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: #e03131;
      color: #fff;
    }

    .empty-msg {
      text-align: center;
      color: #bbb;
      font-size: 0.9rem;
      padding: 16px 0;
    }

    /* 件数カウンター */
    .counter {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }

    .counter strong {
      color: #5c7cfa;
      font-size: 1rem;
    }

    /* 背景カラー選択 */
    .color-picker {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .color-picker span {
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .color-swatch:hover {
      transform: scale(1.2);
    }

    .color-swatch.active {
      border-color: #1a1a2e;
      transform: scale(1.15);
    }

    /* 空入力シェイク */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }

    .shake {
      animation: shake 0.35s ease;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="color-picker">
      <span>背景色:</span>
    </div>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="タスクを入力..." maxlength="100">
      <button onclick="addTask()">追加</button>
    </div>

    <div class="counter" id="counter"></div>
    <ul id="task-list"></ul>
  </div>

  <script>
    let tasks = [];

    const BG_COLORS = [
      { label: 'グレー',    value: '#f0f2f5' },
      { label: 'ラベンダー', value: '#ede9fe' },
      { label: 'ミント',    value: '#d1fae5' },
      { label: 'ピーチ',    value: '#ffe4e6' },
      { label: 'スカイ',    value: '#e0f2fe' },
      { label: 'サンド',    value: '#fef9c3' },
      { label: 'ダーク',    value: '#1e1e2e' },
    ];

    let activeBgIndex = 0;

    function initColorPicker() {
      const picker = document.querySelector('.color-picker');
      BG_COLORS.forEach((color, i) => {
        const swatch = document.createElement('button');
        swatch.className = 'color-swatch' + (i === 0 ? ' active' : '');
        swatch.title = color.label;
        swatch.style.background = color.value;
        swatch.setAttribute('aria-label', color.label);
        swatch.onclick = () => setBg(i);
        picker.appendChild(swatch);
      });
    }

    function setBg(index) {
      document.querySelectorAll('.color-swatch').forEach((s, i) => {
        s.classList.toggle('active', i === index);
      });
      document.body.style.background = BG_COLORS[index].value;
      activeBgIndex = index;
    }

    function render() {
      const list = document.getElementById('task-list');
      const counter = document.getElementById('counter');
      list.innerHTML = '';

      const total = tasks.length;
      const done  = tasks.filter(t => t.done).length;

      if (total === 0) {
        counter.textContent = '';
        const empty = document.createElement('p');
        empty.className = 'empty-msg';
        empty.textContent = 'タスクはありません';
        list.appendChild(empty);
        return;
      }

      const strong = document.createElement('strong');
      strong.textContent = done;
      counter.textContent = '完了 ';
      counter.appendChild(strong);
      counter.append(` / ${total} 件`);

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.className = 'task-item' + (task.done ? ' done' : '');

        const span = document.createElement('span');
        span.className = 'task-text';
        span.textContent = task.text;
        span.onclick = () => toggleTask(index);

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '削除';
        btn.onclick = () => deleteTask(index);

        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) {
        input.classList.remove('shake');
        void input.offsetWidth; // reflow でアニメーションをリセット
        input.classList.add('shake');
        input.focus();
        return;
      }

      tasks.push({ text, done: false });
      input.value = '';
      render();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      render();
    }

    document.getElementById('task-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    initColorPicker();
    render();
  </script>
</body>
</html>
