<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スライドショー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .slideshow {
      text-align: center;
    }

    .image-wrapper {
      position: relative;
      width: 600px;
      height: 300px;
      overflow: hidden;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .image-wrapper img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .image-wrapper img.active {
      opacity: 1;
    }

    .controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      margin-top: 24px;
    }

    .btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #fff;
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.22);
    }

    .btn:disabled {
      opacity: 0.3;
      cursor: default;
    }

    .counter {
      color: rgba(255, 255, 255, 0.7);
      font-size: 15px;
      min-width: 60px;
    }
  </style>
</head>
<body>

<div class="slideshow">
  <div class="image-wrapper" id="imageWrapper"></div>
  <div class="controls">
    <button class="btn" id="prevBtn" disabled>前へ</button>
    <span class="counter" id="counter">1 / 5</span>
    <button class="btn" id="nextBtn">次へ</button>
  </div>
</div>

<script>
  const images = [
    'https://placehold.jp/600x300.png',
    'https://placehold.jp/3d4070/ffffff/600x300.png',
    'https://placehold.jp/0f3460/ffffff/600x300.png',
    'https://placehold.jp/11998e/ffffff/600x300.png',
    'https://placehold.jp/e94560/ffffff/600x300.png',
  ];

  const wrapper = document.getElementById('imageWrapper');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const counter = document.getElementById('counter');
  let current = 0;

  images.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = `スライド ${i + 1}`;
    if (i === 0) img.classList.add('active');
    wrapper.appendChild(img);
  });

  function goTo(index) {
    const imgs = wrapper.querySelectorAll('img');
    imgs[current].classList.remove('active');
    current = index;
    imgs[current].classList.add('active');
    counter.textContent = `${current + 1} / ${images.length}`;
    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === images.length - 1;
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));
</script>

</body>
</html>
