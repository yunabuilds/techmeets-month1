<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      width: 400px;
      padding: 40px 32px 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #222;
    }

    .comment {
      font-size: 14px;
      color: #666;
      text-align: center;
      line-height: 1.6;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .badge {
      background: #eef0ff;
      color: #5567e8;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 14px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://placehold.jp/100x100.png" alt="アイコン">
    <div class="name">山田 太郎</div>
    <div class="comment">Webアプリの開発が好きなエンジニアです。<br>ユーザー体験を大切にしたUI作りを心がけています。</div>
    <div class="badges">
      <span class="badge">HTML / CSS</span>
      <span class="badge">JavaScript</span>
      <span class="badge">React</span>
      <span class="badge">Node.js</span>
      <span class="badge">Git</span>
    </div>
  </div>

  <script>
    // 将来の動的処理はここに追加
  </script>
</body>
</html>
